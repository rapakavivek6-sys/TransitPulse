<!DOCTYPE html>
<html>
<head>
  <title>Transit Map</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map {
      height: 82vh;
      width: 100%;
    }
  </style>

  <script>
  const user = localStorage.getItem("user");
  if (!user) {
    window.location.href = "/login.html";
  }
</script>

<script src="app.js"></script>
<script>
  requireRole(["controller", "manager", "admin"]);
</script>

</head>
<body>
  <header><h1>TransitPulse Live Map</h1>
  <button onclick="logout()">Logout</button>
  </header>
  <main>
    <section class="page-hero">
      <div class="card">
        <h2>Live Network View</h2>
        <p>See bus positions and stop locations across the simulated transport network.</p>
      </div>
    </section>

    <div id="map"></div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
  <script>
    loadMapPage();
    setInterval(loadMapPage, 10000);
  </script>

  <script>
  loadMapPage();

  // 🔄 live bus movement
  setInterval(loadMapPage, 10000);
</script>

</body>
</html>
