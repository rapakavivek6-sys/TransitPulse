<!DOCTYPE html>
<html>
<head>
  <title>Transport Reference</title>
  <link rel="stylesheet" href="styles.css">

  <script>
  const user = localStorage.getItem("user");
  if (!user) {
    window.location.href = "/login.html";
  }
</script>

<script src="app.js"></script>
<script>
  requireRole(["controller", "manager", "admin"]);
</script>

</head>
<body>
  <header><h1>Transport Reference</h1>
  <button onclick="logout()">Logout</button>
  </header>
  <main>
    <h2>Underground Stations</h2>
    <div id="underground"></div>

    <h2>Overground Stations</h2>
    <div id="overground"></div>

    <h2>Local Train Timings</h2>
    <div id="trains"></div>
  </main>
  
  <script>
    async function loadTransportPage() {
      const underground = await apiGet('/api/underground');
      const overground = await apiGet('/api/overground');
      const trains = await apiGet('/api/local-trains');

      document.getElementById('underground').innerHTML = underground.map(item => `
        <div class="card">
          <h3>${item.name}</h3>
          <p>Line: ${item.line}</p>
        </div>
      `).join('');

      document.getElementById('overground').innerHTML = overground.map(item => `
        <div class="card">
          <h3>${item.name}</h3>
          <p>Line: ${item.line}</p>
        </div>
      `).join('');

      document.getElementById('trains').innerHTML = trains.map(item => `
        <div class="card">
          <h3>${item.stationName}</h3>
          <p>Destination: ${item.destination}</p>
          <p>Departure: ${item.departure}</p>
          <p>Platform: ${item.platform}</p>
        </div>
      `).join('');
    }

    loadTransportPage();
    setInterval(loadTransportPage, 60000);
  </script>
</body>
</html>
